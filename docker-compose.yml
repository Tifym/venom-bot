version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: venom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: venom-backend
    restart: unless-stopped
    # No direct port exposure - nginx handles all routing
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://venom:password@postgres:5432/venom_bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./venom-panel
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://backend:8000
        - NEXT_PUBLIC_API_URL=http://localhost/api
        - NEXT_PUBLIC_WS_URL=ws://localhost/ws
    container_name: venom-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    expose:
      - "3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: venom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: venom
      POSTGRES_PASSWORD: password
      POSTGRES_DB: venom_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venom -d venom_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: venom-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
